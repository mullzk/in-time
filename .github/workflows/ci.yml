name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check-and-test:
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: in_time
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s --health-timeout=5s --health-retries=5

    env:
      DJANGO_SECRET_KEY: ci-not-secret
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/in_time

    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - run: uv sync
      - run: npm ci

      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run mypy backend
      - run: npx biome ci .
      - run: npx prettier --check '**/*.{md,yml,yaml}'

      - run: uv run pytest
      - run: npm test

  deploy:
    needs: check-and-test
    if: >-
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      && github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on the server (git, in-place)
        run: |
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" 'bash -euo pipefail -s' <<'REMOTE'
          repo="${{ github.server_url }}/${{ github.repository }}.git"
          dir="${{ vars.DEPLOY_PATH }}/current"
          [ -d "$dir/.git" ] || git clone "$repo" "$dir"
          cd "$dir"
          git fetch origin main
          git checkout --force --detach "${{ github.sha }}"
          git clean -fd
          ln -sfn ../shared/config/env .env
          mise install
          mise exec -- uv sync
          mise exec -- uv run python backend/manage.py check --deploy
          mise exec -- uv run python backend/manage.py migrate
          mise exec -- uv run python backend/manage.py collectstatic --noinput
          sudo systemctl reload-or-restart "${{ vars.DEPLOY_SERVICE }}"
          REMOTE

      - name: Readiness check
        run:
          curl -fsS --retry 5 --retry-delay 2 "${{ secrets.DEPLOY_HEALTH_URL }}"
